name: sdqp-prod-sim

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sdqp
      POSTGRES_USER: sdqp
      POSTGRES_PASSWORD: sdqp
    ports:
      - "35432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdqp -d sdqp"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "38123:8123"
      - "39000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./db/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "39001:9001"
      - "39002:9000"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set sdqp http://minio:9000 minio minio123; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing sdqp/sdqp-prod-snapshots
        /usr/bin/mc mb --ignore-existing sdqp/sdqp-prod-evidence

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:39092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:39092
    ports:
      - "39092:39092"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "31025:1025"
      - "38025:8025"

  mockserver:
    image: mockserver/mockserver:5.15.0
    environment:
      MOCKSERVER_SERVER_PORT: 1080
    ports:
      - "31080:1080"

  hive-metastore:
    image: apache/hive:4.0.0
    environment:
      SERVICE_NAME: metastore
      HIVE_CUSTOM_CONF_DIR: /opt/hive/conf
    ports:
      - "39083:9083"
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - hive-metastore-data:/opt/hive/data/metastore
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9083'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  hive-server:
    image: apache/hive:4.0.0
    depends_on:
      hive-metastore:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
    ports:
      - "31000:10000"
      - "31002:10002"
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "/opt/hive/bin/beeline -u jdbc:hive2://127.0.0.1:10000/default -n hive --silent=true -e 'SELECT 1' >/tmp/sdqp-hive-health.out 2>/tmp/sdqp-hive-health.err"]
      interval: 20s
      timeout: 15s
      retries: 30
      start_period: 120s

  hive-init:
    image: apache/hive:4.0.0
    depends_on:
      hive-server:
        condition: service_healthy
    volumes:
      - ./docker/hive/init:/opt/sdqp/hive/init:ro
    entrypoint:
      - /bin/bash
      - -lc
      - |
        /opt/hive/bin/beeline -u jdbc:hive2://hive-server:10000/default -n hive \
          --silent=true \
          -f /opt/sdqp/hive/init/001_sdqp_fixture.hql
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/sdqp-api/Dockerfile
    environment:
      SDQP_ENVIRONMENT: prod-sim
      SDQP_API_HOST: 0.0.0.0
      SDQP_API_PORT: 8080
      SDQP_API_EXTERNAL_QUERY_WORKER: true
      SDQP_POSTGRES_DSN: postgres://sdqp:sdqp@postgres:5432/sdqp
      SDQP_POSTGRES_MAX_CONNECTIONS: 40
      SDQP_CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      SDQP_CLICKHOUSE_NATIVE_URL: tcp://clickhouse:9000
      SDQP_S3_ENDPOINT: http://minio:9000
      SDQP_S3_REGION: cn-test-1
      SDQP_S3_ACCESS_KEY: minio
      SDQP_S3_SECRET_KEY: minio123
      SDQP_S3_BUCKET_SNAPSHOTS: sdqp-prod-snapshots
      SDQP_S3_BUCKET_EVIDENCE: sdqp-prod-evidence
      SDQP_KAFKA_BROKERS: redpanda:9092
      SDQP_IM_WEBHOOK_URL: http://mockserver:1080/im/webhook
      SDQP_HR_BASE_URL: http://mockserver:1080/hr
      SDQP_NOTIFY_FEISHU_URL: http://mockserver:1080/notify/feishu
      SDQP_NOTIFY_SLACK_URL: http://mockserver:1080/notify/slack
      SDQP_NOTIFY_EMAIL_URL: http://mockserver:1080/notify/email
      SDQP_TSA_BASE_URL: http://mockserver:1080/tsa
      SDQP_HIVE_CONNECTION_URI: jdbc:hive2://hive-server:10000/default
      SDQP_HIVE_PROVIDER: beeline
      SDQP_HIVE_COMMAND: beeline
      SDQP_HIVE_USERNAME: hive
      SDQP_HIVE_TABLE: sdqp_fixture_employees
      SDQP_HIVE_POLL_INTERVAL_MS: 250
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_started
      mockserver:
        condition: service_started
      hive-init:
        condition: service_completed_successfully
    ports:
      - "38080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/readyz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: apps/sdqp-worker/Dockerfile
    environment:
      SDQP_ENVIRONMENT: prod-sim
      SDQP_WORKER_HOST: 0.0.0.0
      SDQP_WORKER_PORT: 8081
      SDQP_POSTGRES_DSN: postgres://sdqp:sdqp@postgres:5432/sdqp
      SDQP_POSTGRES_MAX_CONNECTIONS: 40
      SDQP_CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      SDQP_CLICKHOUSE_NATIVE_URL: tcp://clickhouse:9000
      SDQP_S3_ENDPOINT: http://minio:9000
      SDQP_S3_REGION: cn-test-1
      SDQP_S3_ACCESS_KEY: minio
      SDQP_S3_SECRET_KEY: minio123
      SDQP_S3_BUCKET_SNAPSHOTS: sdqp-prod-snapshots
      SDQP_S3_BUCKET_EVIDENCE: sdqp-prod-evidence
      SDQP_KAFKA_BROKERS: redpanda:9092
      SDQP_IM_WEBHOOK_URL: http://mockserver:1080/im/webhook
      SDQP_HR_BASE_URL: http://mockserver:1080/hr
      SDQP_NOTIFY_FEISHU_URL: http://mockserver:1080/notify/feishu
      SDQP_NOTIFY_SLACK_URL: http://mockserver:1080/notify/slack
      SDQP_NOTIFY_EMAIL_URL: http://mockserver:1080/notify/email
      SDQP_TSA_BASE_URL: http://mockserver:1080/tsa
      SDQP_HIVE_CONNECTION_URI: jdbc:hive2://hive-server:10000/default
      SDQP_HIVE_PROVIDER: beeline
      SDQP_HIVE_COMMAND: beeline
      SDQP_HIVE_USERNAME: hive
      SDQP_HIVE_TABLE: sdqp_fixture_employees
      SDQP_HIVE_POLL_INTERVAL_MS: 250
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "38081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8081/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: apps/sdqp-frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "34173:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  clickhouse-data:
  minio-data:
  hive-warehouse:
  hive-metastore-data:
