environment = "test"

[api]
port = 18080

[worker]
port = 18081

[frontend]
title = "SDQP Test"
port = 14173

[database.postgres]
dsn = "postgres://sdqp:sdqp@127.0.0.1:15432/sdqp_test"

[database.clickhouse]
http_url = "http://127.0.0.1:18123"
native_url = "tcp://127.0.0.1:19000"

[object_store]
endpoint = "http://127.0.0.1:19002"

[kafka]
brokers = ["127.0.0.1:19092"]

[audit.checkpoint]
provider = "mock"
key_id = "sdqp-test-audit-checkpoint"
key_version = "1"

[audit.forwarder]
enabled = false
provider = "webhook"
timeout_ms = 3000
webhook_url = "http://127.0.0.1:19080/audit/siem"
kafka_brokers = ["127.0.0.1:19092"]
kafka_topic = "sdqp.audit.siem.test"
syslog_endpoint = "127.0.0.1:19140"
syslog_hostname = "sdqp-test"
syslog_app_name = "sdqp-audit"

[audit.retention]
enabled = true
archive_after_secs = 7776000
archive_dir = ""
