[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib"
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
